<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ChainBacc - 區塊鏈百家樂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bead-road { display: grid; grid-template-rows: repeat(6, 1fr); grid-auto-flow: column; gap: 2px; background: #1a1a1a; padding: 5px; border-radius: 4px; overflow-x: auto; }
        .bead { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }
        .bg-banker { background-color: #ef4444; }
        .bg-player { background-color: #3b82f6; }
        .bg-tie { background-color: #22c55e; }
    </style>
</head>
<body class="bg-black text-white font-sans">
    <div class="bg-zinc-900 p-2 text-center border-b border-zinc-800">
        <code class="text-green-400 text-[10px]">{{ hash }}</code>
    </div>

    <div class="relative h-64 bg-cover bg-center" style="background-image: url('/static/images/dealer_bg.jpg');">
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
            <img src="/static/images/ai_dealer.png" class="h-full object-contain" alt="Dealer">
        </div>
        <div class="absolute bottom-2 left-2 bg-black/60 p-2 rounded">
            <p class="text-sm">餘額: <span id="balance">10,000.00</span></p>
        </div>
    </div>

    <div class="p-4 space-y-4">
        <div id="road-map" class="bead-road h-32 border border-zinc-800"></div>
        <div class="grid grid-cols-3 gap-2">
            <button onclick="bet('P')" class="bg-blue-600 py-4 rounded-xl font-bold">🔵 閒</button>
            <button onclick="bet('T')" class="bg-green-600 py-4 rounded-xl font-bold">🟢 和</button>
            <button onclick="bet('B')" class="bg-red-600 py-4 rounded-xl font-bold">🔴 莊</button>
        </div>
    </div>

    <script>
        let history = [];
        function renderRoad() {
            const container = document.getElementById('road-map');
            container.innerHTML = '';
            history.forEach(res => {
                const b = document.createElement('div');
                b.className = `bead ${res === 'B' ? 'bg-banker' : res === 'P' ? 'bg-player' : 'bg-tie'}`;
                b.innerText = res;
                container.appendChild(b);
            });
        }

        async function bet(side) {
            const response = await fetch('/bet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ side: side, amount: 100 })
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('balance').innerText = data.new_balance;
                history.push(data.result);
                renderRoad();
            } else {
                alert('下注失敗');
            }
        }
    </script>
</body>
</html>
