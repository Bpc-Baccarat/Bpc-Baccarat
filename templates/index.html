<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainBacc - 區塊鏈百家樂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bead-road { display: grid; grid-template-rows: repeat(6, 1fr); grid-auto-flow: column; gap: 2px; background: #1a1a1a; padding: 5px; border-radius: 4px; overflow-x: auto; }
        .bead { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }
        .bg-banker { background-color: #ef4444; } /* 紅色 */
        .bg-player { background-color: #3b82f6; } /* 藍色 */
        .bg-tie { background-color: #22c55e; }    /* 綠色 */
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="bg-zinc-900 p-2 text-center border-b border-zinc-800">
        <p class="text-xs text-zinc-500">當前靴 SHA-256 Hash (加密預告)</p>
        <code class="text-green-400 break-all text-[10px]">{{ hash }}</code>
    </div>

    <div class="relative h-64 bg-cover bg-center" style="background-image: url('/static/images/dealer_bg.jpg');">
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
            <img src="/static/images/ai_dealer.png" class="h-full object-contain" alt="Dealer">
        </div>
        <div class="absolute bottom-2 left-2 bg-black/60 p-2 rounded">
            <p class="text-sm">餘額: <span id="balance">10,000.00</span></p>
        </div>
    </div>

    <div class="p-4 space-y-4">
        <div id="road-map" class="bead-road h-32 border border-zinc-800">
            </div>

        <div class="grid grid-cols-3 gap-2">
            <button onclick="bet('P')" class="bg-blue-600 py-4 rounded-xl font-bold active:scale-95 transition">🔵 閒 (1:1)</button>
            <button onclick="bet('T')" class="bg-green-600 py-4 rounded-xl font-bold active:scale-95 transition">🟢 和 (1:8)</button>
            <button onclick="bet('B')" class="bg-red-600 py-4 rounded-xl font-bold active:scale-95 transition">🔴 莊 (1:0.95)</button>
        </div>
    </div>

    <script>
        let history = ['B', 'P', 'B', 'B', 'T', 'P']; // 示範數據

        function renderRoad() {
            const container = document.getElementById('road-map');
            container.innerHTML = '';
            history.forEach(res => {
                const bead = document.createElement('div');
                bead.className = `bead ${res === 'B' ? 'bg-banker' : res === 'P' ? 'bg-player' : 'bg-tie'}`;
                bead.innerText = res;
                container.appendChild(bead);
            });
        }

        async function bet(side) {
            alert('下注成功: ' + side);
            // 這裡呼叫後端 API: fetch('/bet', {method: 'POST', ...})
        }

        renderRoad();
    </script>
</body>
</html>
